name: Mobile PR Checks

on:
  pull_request:
    paths:
      - "apps/mobileApp/**"
      - ".github/workflows/mobile-pr-checks.yml"

permissions:
  contents: read

concurrency:
  group: mobile-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-mobile:
    name: Verify mobile app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobileApp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mobileApp/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Verify Expo config and types
        env:
          EXPO_PUBLIC_API_URL: https://example.invalid
        run: npm run ci:verify
